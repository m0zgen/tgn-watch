relay:
  endpoint: "http://127.0.0.1:8080/api/v1/send"
  key: "change-me-super-secret"
  default_group: "monitoring"
  timeout: "3s"

watcher:
  interval: "30s"
  notify_on_recovery: true
  dedup_window: "10m"
  hostname: ""
  # Command checks execute via /bin/sh -c and are disabled by default for safety.
  command_checks_enabled: false
  # Auto actions also execute via /bin/sh -c and are disabled by default for safety.
  actions_enabled: false

server:
  # Local observability endpoints: /healthz, /status, /metrics
  enabled: true
  listen: "127.0.0.1:34351"

checks:
  - name: "tgn-relay local health"
    type: "http"
    url: "http://127.0.0.1:8080/healthz"
    expect_status: 200
    timeout: "3s"
    group: "monitoring"
    severity: "critical"

  - name: "Local SSH TCP"
    type: "tcp"
    target: "127.0.0.1:22"
    timeout: "2s"
    group: "monitoring"
    severity: "warning"

  - name: "DNS resolver check"
    type: "dns"
    server: "127.0.0.1:53"
    qname: "openbld.net."
    qtype: "A"
    expect_rcode: "NOERROR"
    timeout: "2s"
    group: "monitoring"
    severity: "critical"

  - name: "tgn-relay systemd"
    type: "systemd"
    service: "tgn-relay.service"
    timeout: "3s"
    group: "monitoring"
    severity: "critical"
    # Enable watcher.actions_enabled before using auto actions.
    # action_enabled: true
    # action_command: "systemctl restart tgn-relay.service"
    # action_retries: 2
    # action_timeout: "10s"
    # action_delay: "2s"
    # action_cooldown: "5m"

  - name: "tgn-relay process"
    type: "process"
    process: "tgn-relay"
    timeout: "3s"
    group: "monitoring"
    severity: "critical"

  - name: "Root disk"
    type: "disk"
    path: "/"
    max_used_percent: 90
    timeout: "3s"
    group: "monitoring"
    severity: "warning"

  - name: "Memory usage"
    type: "memory"
    max_used_percent: 90
    timeout: "3s"
    group: "monitoring"
    severity: "warning"

  - name: "OpenBLD TLS certificate"
    type: "tls_cert"
    target: "openbld.net:443"
    warn_days: 14
    critical_days: 3
    interval: "6h"
    timeout: "5s"
    group: "monitoring"
    severity: "warning"

  - name: "Blocklist freshness example"
    type: "file_age"
    path: "/var/lib/zbld/hosts.txt"
    max_age: "6h"
    interval: "10m"
    timeout: "3s"
    group: "monitoring"
    severity: "warning"

  # Enable watcher.command_checks_enabled before using command checks.
  # - name: "Custom command example"
  #   type: "command"
  #   command: "systemctl is-active tgn-relay.service"
  #   expect_exit_code: 0
  #   interval: "1m"
  #   timeout: "3s"
  #   group: "monitoring"
  #   severity: "critical"


